openapi: 3.0.3
info:
  title: Aura Backend API
  version: 1.0.0
  description: Testable API contract for the Aura backend, including mobile and admin routes.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: Media
  - name: Location
  - name: Discovery
  - name: Matches
  - name: Chat
  - name: Notifications
  - name: Safety
  - name: Subscriptions
  - name: Admin
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [Health]
      summary: Root health check
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/v1/auth/request-otp:
    post:
      tags: [Auth]
      summary: Request OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and login/register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Auth token pair
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResponse"

  /api/v1/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device/session
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all user sessions
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/auth/account:
    delete:
      tags: [Auth]
      summary: Soft-delete current account
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/catalog/interests:
    get:
      tags: [Profile]
      summary: Interest catalog
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/catalog/prompts:
    get:
      tags: [Profile]
      summary: Prompt catalog
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/catalog/lifestyle-questions:
    get:
      tags: [Profile]
      summary: Lifestyle question catalog
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/me:
    get:
      tags: [Profile]
      summary: Current user profile
      responses:
        "200":
          $ref: "#/components/responses/Success"
    patch:
      tags: [Profile]
      summary: Partially update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/interests:
    get:
      tags: [Profile]
      summary: Interest catalog
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Profile]
      summary: Replace selected interests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterestsRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/prompts:
    get:
      tags: [Profile]
      summary: Prompt catalog
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Profile]
      summary: Replace profile prompts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptsRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/lifestyle:
    get:
      tags: [Profile]
      summary: Lifestyle question catalog
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Profile]
      summary: Replace lifestyle answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLifestyleRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/complete:
    post:
      tags: [Profile]
      summary: Complete profile onboarding
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/profile/media/me:
    get:
      tags: [Media]
      summary: Current user's profile media
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/media/photos:
    post:
      tags: [Media]
      summary: Upload profile photo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                isPrimary:
                  type: boolean
      responses:
        "202":
          $ref: "#/components/responses/Success"

  /api/v1/profile/media/intro-video:
    post:
      tags: [Media]
      summary: Upload intro video
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "202":
          $ref: "#/components/responses/Success"

  /api/v1/profile/media/{mediaUuid}/primary:
    patch:
      tags: [Media]
      summary: Set primary profile photo
      parameters:
        - $ref: "#/components/parameters/MediaUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/media/reorder:
    patch:
      tags: [Media]
      summary: Reorder profile media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderMediaRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/profile/media/{mediaUuid}:
    delete:
      tags: [Media]
      summary: Soft-delete profile media
      parameters:
        - $ref: "#/components/parameters/MediaUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/media/{mediaUuid}/{variant}:
    get:
      tags: [Media]
      summary: Serve authorized media variant
      description: >-
        Requires `Authorization: Bearer <accessToken>`. Uploads are accepted
        before async processing completes, so display and thumbnail variants may
        return 404 until they are generated.
      parameters:
        - $ref: "#/components/parameters/MediaUuid"
        - name: variant
          in: path
          required: true
          schema:
            type: string
            enum: [original, display, thumbnail, transcoded]
      responses:
        "200":
          description: Binary media response
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/location/me:
    get:
      tags: [Location]
      summary: Current user's exact location
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/location:
    put:
      tags: [Location]
      summary: Update current user's location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/discovery/preferences:
    get:
      tags: [Discovery]
      summary: Discovery preferences
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Discovery]
      summary: Replace discovery preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryPreferencesRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/discovery/readiness:
    get:
      tags: [Discovery]
      summary: Discovery readiness
      responses:
        "200":
          description: Live discovery readiness
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiscoveryReadiness"

  /api/v1/discovery/feed:
    get:
      tags: [Discovery]
      summary: Discovery feed
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          $ref: "#/components/responses/PaginatedSuccess"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/discovery/profiles/{userUuid}:
    get:
      tags: [Discovery]
      summary: Discovery profile detail
      parameters:
        - $ref: "#/components/parameters/UserUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/discovery/impressions:
    post:
      tags: [Discovery]
      summary: Record discovery impressions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateImpressionsRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/discovery/actions:
    post:
      tags: [Discovery]
      summary: Like, pass, or Super Like a discoverable user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActionRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "201":
          $ref: "#/components/responses/Success"
        "429":
          $ref: "#/components/responses/Error"

  /api/v1/matches:
    get:
      tags: [Matches]
      summary: Active match list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          $ref: "#/components/responses/PaginatedSuccess"

  /api/v1/matches/{matchUuid}:
    get:
      tags: [Matches]
      summary: Match detail
      parameters:
        - $ref: "#/components/parameters/MatchUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/matches/{matchUuid}/seen:
    post:
      tags: [Matches]
      summary: Mark match seen/opened
      parameters:
        - $ref: "#/components/parameters/MatchUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/matches/{matchUuid}/unmatch:
    post:
      tags: [Matches]
      summary: Unmatch
      parameters:
        - $ref: "#/components/parameters/MatchUuid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnmatchRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/chats:
    get:
      tags: [Chat]
      summary: Chat list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          $ref: "#/components/responses/PaginatedSuccess"

  /api/v1/chats/{conversationUuid}/messages:
    get:
      tags: [Chat]
      summary: Message history
      parameters:
        - $ref: "#/components/parameters/ConversationUuid"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          $ref: "#/components/responses/PaginatedSuccess"
    post:
      tags: [Chat]
      summary: Send text message
      parameters:
        - $ref: "#/components/parameters/ConversationUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"

  /api/v1/chats/{conversationUuid}/read:
    post:
      tags: [Chat]
      summary: Mark conversation read
      parameters:
        - $ref: "#/components/parameters/ConversationUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/messages/{messageUuid}:
    delete:
      tags: [Chat]
      summary: Soft-delete own message
      parameters:
        - $ref: "#/components/parameters/MessageUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /ws:
    get:
      tags: [Chat]
      summary: WebSocket realtime connection
      description: Prefer Authorization header. Mobile clients may pass access token as query parameter.
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade

  /api/v1/devices/fcm-token:
    post:
      tags: [Notifications]
      summary: Register/update device FCM token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertFcmTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Notifications]
      summary: Remove device FCM token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteFcmTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: Notification list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          $ref: "#/components/responses/PaginatedSuccess"

  /api/v1/notifications/{notificationUuid}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification read
      parameters:
        - $ref: "#/components/parameters/NotificationUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications read
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/notification-settings:
    get:
      tags: [Notifications]
      summary: Notification settings
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Notifications]
      summary: Replace notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/reports/reasons:
    get:
      tags: [Safety]
      summary: Report reason catalog
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/reports:
    post:
      tags: [Safety]
      summary: Create report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"

  /api/v1/reports/me:
    get:
      tags: [Safety]
      summary: Current user's submitted reports
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/safety/block-and-report:
    post:
      tags: [Safety]
      summary: Create report and block target user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"

  /api/v1/safety/settings:
    get:
      tags: [Safety]
      summary: Safety settings
      responses:
        "200":
          $ref: "#/components/responses/Success"
    put:
      tags: [Safety]
      summary: Replace safety settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SafetySettingsRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/blocks:
    get:
      tags: [Safety]
      summary: Blocked user list
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/blocks/{userUuid}:
    post:
      tags: [Safety]
      summary: Block user
      parameters:
        - $ref: "#/components/parameters/UserUuid"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reasonCode:
                  type: string
                note:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/Success"
    delete:
      tags: [Safety]
      summary: Unblock user
      parameters:
        - $ref: "#/components/parameters/UserUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/subscriptions/plans:
    get:
      tags: [Subscriptions]
      summary: Active subscription plans
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/subscriptions/me:
    get:
      tags: [Subscriptions]
      summary: Current active subscription
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/subscriptions/entitlements:
    get:
      tags: [Subscriptions]
      summary: Current entitlements
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/subscriptions/usage:
    get:
      tags: [Subscriptions]
      summary: Current UTC-day premium usage
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/subscriptions/premium-status:
    get:
      tags: [Subscriptions]
      summary: Current premium status
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/subscriptions/manual-payment-requests:
    get:
      tags: [Subscriptions]
      summary: Current user's manual payment requests
      responses:
        "200":
          $ref: "#/components/responses/Success"
    post:
      tags: [Subscriptions]
      summary: Submit manual payment request
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManualPaymentRequest"
      responses:
        "201":
          $ref: "#/components/responses/Success"

  /api/v1/admin/auth/login:
    post:
      tags: [Admin]
      summary: Admin login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/admin/auth/refresh-token:
    post:
      tags: [Admin]
      summary: Refresh admin token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRefreshTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/admin/auth/logout:
    post:
      tags: [Admin]
      summary: Revoke admin session
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLogoutRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/admin/auth/me:
    get:
      tags: [Admin]
      summary: Current admin user
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/admin/auth/change-password:
    post:
      tags: [Admin]
      summary: Change admin password and revoke all admin sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminChangePasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/admin/subscriptions/payment-requests:
    get:
      tags: [Admin]
      summary: Admin payment request list
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, UNDER_REVIEW, APPROVED, REJECTED, CANCELED]
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/admin/subscriptions/payment-requests/{paymentRequestUuid}:
    get:
      tags: [Admin]
      summary: Admin payment request detail
      parameters:
        - $ref: "#/components/parameters/PaymentRequestUuid"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/admin/subscriptions/payment-requests/{paymentRequestUuid}/approve:
    post:
      tags: [Admin]
      summary: Approve manual payment request
      parameters:
        - $ref: "#/components/parameters/PaymentRequestUuid"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminReviewPaymentRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/admin/subscriptions/payment-requests/{paymentRequestUuid}/reject:
    post:
      tags: [Admin]
      summary: Reject manual payment request
      parameters:
        - $ref: "#/components/parameters/PaymentRequestUuid"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRejectPaymentRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/admin/roles:
    get:
      tags: [Admin]
      summary: List admin roles and permissions
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/admin/capabilities:
    get:
      tags: [Admin]
      summary: Admin module capabilities
      responses:
        "200":
          description: Enabled admin modules
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
