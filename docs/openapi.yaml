components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    AnalyticsFrom:
      name: from
      in: query
      required: false
      description: Inclusive range start. Defaults to the start of the current UTC day minus 29 days.
      schema:
        type: string
        format: date-time
    AnalyticsTo:
      name: to
      in: query
      required: false
      description: Exclusive range end. Defaults to the start of the next UTC day.
      schema:
        type: string
        format: date-time
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Required for payment-like mutations.
    UserUuid:
      name: userUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaUuid:
      name: mediaUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MatchUuid:
      name: matchUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConversationUuid:
      name: conversationUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MessageUuid:
      name: messageUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationUuid:
      name: notificationUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentRequestUuid:
      name: paymentRequestUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuditLogUuid:
      name: auditLogUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AdminUserUuid:
      name: adminUserUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RestrictionId:
      name: restrictionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Success:
      description: Successful API response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"
    PaginatedSuccess:
      description: Successful paginated response
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiResponse"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      nextCursor:
                        type: string
                        nullable: true
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"

  schemas:
    ApiResponse:
      type: object
      required: [success, statusCode, message]
      properties:
        success:
          type: boolean
          example: true
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: OK
        data:
          nullable: true
          additionalProperties: true

    ApiErrorResponse:
      type: object
      required: [success, statusCode, message, error]
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
          example: 400
        status_code:
          type: integer
          description: Compatibility alias returned by rate-limit errors.
          example: 429
        message:
          type: string
          example: Validation failed
        error:
          type: object
          required: [code]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            retryAfterSeconds:
              type: integer
              format: int64
              example: 60
            details:
              nullable: true
              additionalProperties: true

    RequestOtpRequest:
      type: object
      required: [channel, purpose]
      properties:
        channel:
          type: string
          enum: [WHATSAPP, EMAIL]
        phone:
          type: string
        email:
          type: string
          format: email
        purpose:
          type: string
          example: LOGIN
        deviceId:
          type: string

    VerifyOtpRequest:
      type: object
      required: [channel, purpose, code]
      properties:
        channel:
          type: string
          enum: [WHATSAPP, EMAIL]
        phone:
          type: string
        email:
          type: string
          format: email
        purpose:
          type: string
          example: LOGIN
        code:
          type: string
        deviceId:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        fcmToken:
          type: string
        appVersion:
          type: string
        osVersion:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
        deviceId:
          type: string

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
        deviceId:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        refreshExpiresIn:
          type: integer
        user:
          type: object
          additionalProperties: true

    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AdminRefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AdminLogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string

    AdminChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 12

    AdminAuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        refreshExpiresIn:
          type: integer
        admin:
          $ref: "#/components/schemas/AdminUser"

    AdminUser:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        status:
          type: string
          enum: [INVITED, ACTIVE, DISABLED, LOCKED]
        mustChangePassword:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    AdminCapabilitiesResponse:
      type: object
      properties:
        modules:
          type: object
          properties:
            trustSafety:
              type: boolean
            games:
              type: boolean
            pkBattle:
              type: boolean
            greedyGame:
              type: boolean
            wallet:
              type: boolean
            gift:
              type: boolean
            agency:
              type: boolean
            reseller:
              type: boolean
            live:
              type: boolean
            liveComments:
              type: boolean
            chatModeration:
              type: boolean

    CreateAdminUserRequest:
      type: object
      required: [email, roles, reason]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        temporaryPassword:
          type: string
          minLength: 12
        roles:
          type: array
          items:
            type: string
        reason:
          type: string

    AssignAdminRoleRequest:
      type: object
      required: [role, reason]
      properties:
        role:
          type: string
        reason:
          type: string

    RemoveAdminRoleRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    UpdateAdminStatusRequest:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [INVITED, ACTIVE, DISABLED, LOCKED]
        reason:
          type: string

    CreateUserRestrictionRequest:
      type: object
      required: [restrictionType, reason]
      properties:
        restrictionType:
          type: string
          enum:
            - FULL_PLATFORM_BAN
            - LIVE_CREATE_BAN
            - COMMENT_BAN
            - GIFT_SEND_BAN
            - RESELLER_OPERATION_BAN
            - AGENCY_OPERATION_BAN
        reason:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true

    RevokeUserRestrictionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    UserRestriction:
      type: object
      properties:
        restrictionUuid:
          type: string
          format: uuid
        restrictionType:
          type: string
        status:
          type: string
          enum: [ACTIVE, REVOKED, EXPIRED]
        reason:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ReviewReportRequest:
      type: object
      required: [decision, reason]
      properties:
        decision:
          type: string
          enum: [REVIEWED, DISMISSED, ACTIONED]
        reason:
          type: string
        note:
          type: string
          nullable: true
        action:
          $ref: "#/components/schemas/ReviewReportAction"

    ReviewReportAction:
      type: object
      properties:
        type:
          type: string
          enum: [NONE, RESTRICT_USER, HIDE_COMMENT, FORCE_END_LIVE, HIDE_CHAT_MESSAGE]
          description: Only NONE and RESTRICT_USER are currently available.
        restrictionType:
          type: string
          enum:
            - FULL_PLATFORM_BAN
            - LIVE_CREATE_BAN
            - COMMENT_BAN
            - GIFT_SEND_BAN
            - RESELLER_OPERATION_BAN
            - AGENCY_OPERATION_BAN
        expiresAt:
          type: string
          format: date-time
          nullable: true

    AdminReport:
      type: object
      properties:
        reportUuid:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, REVIEWED, DISMISSED, ACTIONED]
        targetType:
          type: string
        targetUuid:
          type: string
          format: uuid
        reasonCode:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]

    AdminReviewPaymentRequest:
      type: object
      properties:
        note:
          type: string
          maxLength: 500

    AdminRejectPaymentRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          maxLength: 500

    AdminAuditLog:
      type: object
      properties:
        auditLogUuid:
          type: string
          format: uuid
        adminUserUuid:
          type: string
          format: uuid
          nullable: true
        adminEmail:
          type: string
          format: email
          nullable: true
        actorType:
          type: string
          enum: [ADMIN, SYSTEM]
        action:
          type: string
        resourceType:
          type: string
        resourceUuid:
          type: string
          format: uuid
          nullable: true
        reason:
          type: string
          nullable: true
        beforeSnapshot:
          type: object
          additionalProperties: true
        afterSnapshot:
          type: object
          additionalProperties: true
        requestId:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
          enum: [MALE, FEMALE, NON_BINARY, OTHER]
        lookingForGender:
          type: string
          enum: [MALE, FEMALE, EVERYONE]
        bio:
          type: string
        heightCm:
          type: integer
        education:
          type: string
        jobTitle:
          type: string
        company:
          type: string
        city:
          type: string
        country:
          type: string
        relationshipGoal:
          type: string
          enum: [SERIOUS_RELATIONSHIP, LONG_TERM, FRIENDSHIP, CASUAL, NOT_SURE]
        showAge:
          type: boolean
        showDistance:
          type: boolean

    UpdateInterestsRequest:
      type: object
      required: [interestIds]
      properties:
        interestIds:
          type: array
          minItems: 3
          maxItems: 15
          items:
            type: integer

    UpdatePromptsRequest:
      type: object
      required: [prompts]
      properties:
        prompts:
          type: array
          minItems: 2
          maxItems: 3
          items:
            type: object
            required: [promptQuestionId, answer]
            properties:
              promptQuestionId:
                type: integer
              answer:
                type: string
                maxLength: 300

    UpdateLifestyleRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: object
            required: [lifestyleQuestionId, answer]
            properties:
              lifestyleQuestionId:
                type: integer
              answer:
                nullable: true

    ReorderMediaRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [mediaUuid, sortOrder]
            properties:
              mediaUuid:
                type: string
                format: uuid
              sortOrder:
                type: integer

    UpdateLocationRequest:
      type: object
      required: [latitude, longitude, source]
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        accuracyMeters:
          type: number
          format: double
        city:
          type: string
        country:
          type: string
        source:
          type: string
          enum: [GPS, MANUAL, IP]

    DiscoveryPreferencesRequest:
      type: object
      required: [minAge, maxAge, preferredGenders, maxDistanceKm, verifiedOnly, showMeInDiscovery, hideDistance]
      properties:
        minAge:
          type: integer
          minimum: 18
        maxAge:
          type: integer
          maximum: 80
        preferredGenders:
          type: array
          items:
            type: string
            enum: [MALE, FEMALE, NON_BINARY, OTHER, EVERYONE]
        maxDistanceKm:
          type: integer
          minimum: 1
          maximum: 200
        verifiedOnly:
          type: boolean
        showMeInDiscovery:
          type: boolean
        hideDistance:
          type: boolean

    DiscoveryReadiness:
      type: object
      properties:
        discoveryEligible:
          type: boolean
        missing:
          type: array
          items:
            type: string
        blocked:
          type: array
          items:
            type: string

    CreateImpressionsRequest:
      type: object
      required: [items]
      properties:
        source:
          type: string
          example: DISCOVERY_FEED
        items:
          type: array
          items:
            type: object
            required: [candidateUserUuid, rankPosition]
            properties:
              candidateUserUuid:
                type: string
                format: uuid
              rankPosition:
                type: integer

    CreateActionRequest:
      type: object
      required: [targetUserUuid, actionType, clientActionId]
      properties:
        targetUserUuid:
          type: string
          format: uuid
        actionType:
          type: string
          enum: [LIKE, PASS, SUPER_LIKE]
        clientActionId:
          type: string
          format: uuid

    UnmatchRequest:
      type: object
      properties:
        reasonCode:
          type: string
          maxLength: 50
        reasonNote:
          type: string
          maxLength: 300

    SendMessageRequest:
      type: object
      required: [clientMessageId, messageType, body]
      properties:
        clientMessageId:
          type: string
          format: uuid
        messageType:
          type: string
          enum: [TEXT]
        body:
          type: string
          maxLength: 2000

    MarkReadRequest:
      type: object
      required: [lastReadMessageUuid]
      properties:
        lastReadMessageUuid:
          type: string
          format: uuid

    UpsertFcmTokenRequest:
      type: object
      required: [deviceId, fcmToken]
      properties:
        deviceId:
          type: string
        fcmToken:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        appVersion:
          type: string
        osVersion:
          type: string

    DeleteFcmTokenRequest:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string

    NotificationSettingsRequest:
      type: object
      required: [pushEnabled, newMatchEnabled, chatMessageEnabled, superLikeEnabled, quietHoursEnabled, timezone]
      properties:
        pushEnabled:
          type: boolean
        newMatchEnabled:
          type: boolean
        chatMessageEnabled:
          type: boolean
        superLikeEnabled:
          type: boolean
        quietHoursEnabled:
          type: boolean
        quietHoursStart:
          type: string
          nullable: true
          example: "23:00"
        quietHoursEnd:
          type: string
          nullable: true
          example: "07:00"
        timezone:
          type: string
          example: Asia/Dhaka

    CreateReportRequest:
      type: object
      required: [targetType, targetUuid, reasonCode]
      properties:
        targetType:
          type: string
          enum: [USER, PROFILE, MESSAGE, MEDIA, MATCH]
        targetUuid:
          type: string
          format: uuid
        reasonCode:
          type: string
          enum: [FAKE_PROFILE, HARASSMENT, HATE_SPEECH, NUDITY_OR_SEXUAL_CONTENT, SCAM_OR_SPAM, UNDERAGE, VIOLENCE_OR_THREAT, IMPERSONATION, OTHER]
        note:
          type: string
          maxLength: 1000
        blockUser:
          type: boolean

    SafetySettingsRequest:
      type: object
      required: [allowMessageRequests, autoHideBlockedUsers]
      properties:
        allowMessageRequests:
          type: boolean
        autoHideBlockedUsers:
          type: boolean

    CreateManualPaymentRequest:
      type: object
      required: [planCode, paymentProvider, paymentReference]
      properties:
        planCode:
          type: string
          example: AURA_PREMIUM_30
        paymentProvider:
          type: string
          example: BKASH
        paymentReference:
          type: string
          example: TRX123456
        payerPhone:
          type: string
        note:
          type: string
